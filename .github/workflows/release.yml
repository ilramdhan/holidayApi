name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'
    
    - name: Run tests
      run: go test -v ./...
    
    - name: Build binaries
      run: |
        # Build for multiple platforms
        GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o bin/holidayapi-linux-amd64 cmd/server/main.go
        GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o bin/holidayapi-linux-arm64 cmd/server/main.go
        GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o bin/holidayapi-darwin-amd64 cmd/server/main.go
        GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o bin/holidayapi-darwin-arm64 cmd/server/main.go
        GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o bin/holidayapi-windows-amd64.exe cmd/server/main.go
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          bin/holidayapi-linux-amd64
          bin/holidayapi-linux-arm64
          bin/holidayapi-darwin-amd64
          bin/holidayapi-darwin-arm64
          bin/holidayapi-windows-amd64.exe
        generate_release_notes: true
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}